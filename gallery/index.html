<style>
    /* #region - Globals */
    .section {
        display: flex;
        justify-content: center;
        padding: 4rem 0;
    }
    .section__wrapper {
        width: 100%;
        max-width: 70rem;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 1rem;
        padding: 0 4rem;
    }
    .section__header {
        grid-column: span 12;
        text-align: center;
        font-size: 8rem;
        font-family: var(--font-display);
        margin-bottom: 2rem;
        /* text-decoration: underline; */
        /* font-weight: bold; */
    }
    .img {
        width: 100%;
        height: auto;
    }
    img {
        width: 100%;
        height: auto;
    }
    .theme__cream--1 {
        background-color: var(--color-cream);
        color: var(--color-primary);
    }
    .theme__cream--2 {
        background-color: var(--color-cream);
        color: var(--color-secondary);
    }
    .theme__primary {
        background-color: var(--color-primary);
        color: var(--color-cream);
    }
    .theme__secondary {
        background-color: var(--color-secondary);
        color: var(--color-cream);
    }
    .foliage {
        position: absolute;
    }
    .btn--active {
        background-color: var(--btn-color);
        border-color: var(--btn-color);
        color: var(--color-primary);
    }
    /* #endregion */

    /* #region - Contribute */
    .contribute__wrapper {
        gap: 2rem;
    }
    .contribute .section__header { margin: 0; }
    .contribute .subheader {
        font-size: 3rem;
        grid-column: span 12;
        text-align: center;
        gap: 2rem;
    }
    .qr {
        grid-column: span 12;
        justify-self: center;
    }
    .qr img {
        max-width: 300px;
        border-radius: 10px;
    }


    /* #endregion */

    /* #region - Gallery */
    .gallery {
        position: relative;
        overflow: hidden;

    }

    .gallery__wrapper {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: auto;
        gap: 2rem;
        padding: 4rem;
        border: 4px solid var(--color-secondary);
        z-index: 10;
        background-color: var(--color-cream);

    }

    .gallery .img   {
        width: 100%;
        height: 268px;
        background-size: cover;
        background-position: center;
    }

    .gallery .foliage--1 {
        top: -100px;
        left: -50px;
        width: 400px;
        height: auto;
        transform: scaleX(-1) rotate(210deg);
    }
    .gallery .foliage--2 {
        top: 200px;
        right: 50px;
        width: 300px;
        height: auto;
        transform: scaleX(-1) rotate(105deg);
    }
    .gallery .foliage--3 {
        bottom: 300px;
        left: 50px;
        width: 250px;
        height: auto;
        transform:  rotate(75deg);
    }
    .gallery .foliage--4 {
        bottom: -60px;
        right: 0px;
        width: 400px;
        height: auto;
        transform: scaleX(-1) rotate(25deg);
    }

    /* #endregion */
    
    /* #region - Media Queries */
    @media screen and (max-width: 1024px) {
        :root {
            font-size: 12px;
        }
        
    }
    @media screen and (max-width: 768px) {
        :root {
            font-size: 10px;
        }
    }
    /* #endregion */
</style>
